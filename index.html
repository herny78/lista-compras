<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Lista de Compras</title>
  <link rel="manifest" href="manifest.json">
  <script>
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyANK0IgHoath4S8XQzeEfhLkAf0-XfLQrE",
      authDomain:        "lista-compras-f0a46.firebaseapp.com",
      projectId:         "lista-compras-f0a46",
      storageBucket:     "lista-compras-f0a46.firebasestorage.app",
      messagingSenderId: "703559588150",

    };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#b0b8c1; --surface:#fff; --surface2:#f1f3f5; --border:#ced4da;
      --primary:#2563eb; --primary-h:#1d4ed8;
      --danger:#dc2626; --success:#16a34a; --warn:#d97706;
      --text:#1e293b; --text-s:#64748b;
      --radius:10px; --shadow:0 1px 5px rgba(0,0,0,.12);
    }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    #app { display:flex; flex-direction:column; min-height:100vh; }
    header { background:var(--primary); color:#fff; padding:0 1rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.2); }
    header h1 { font-size:1.1rem; font-weight:700; }
    #sync-status { font-size:.75rem; background:rgba(255,255,255,.2); padding:.2rem .65rem; border-radius:12px; }
    nav { background:var(--surface); border-bottom:2px solid var(--border); display:flex; overflow-x:auto; scrollbar-width:none; position:sticky; top:56px; z-index:99; }
    nav::-webkit-scrollbar { display:none; }
    nav button { flex:none; background:none; border:none; padding:.65rem .9rem; font-size:.85rem; color:var(--text-s); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:all .15s; }
    nav button.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }
    main { flex:1; padding:1rem; max-width:960px; margin:0 auto; width:100%; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; margin-bottom:1rem; box-shadow:var(--shadow); }
    .card h2 { font-size:1rem; font-weight:700; margin-bottom:.75rem; }
    .card h3 { font-size:.85rem; font-weight:600; color:var(--text-s); margin-bottom:.5rem; }
    .form-row { display:flex; gap:.5rem; flex-wrap:wrap; align-items:flex-end; }
    .form-group { display:flex; flex-direction:column; gap:.3rem; flex:1; min-width:110px; }
    .form-group label { font-size:.78rem; color:var(--text-s); font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
    input, select { border:1px solid var(--border); border-radius:6px; padding:.52rem .7rem; font-size:.9rem; color:var(--text); background:var(--surface); outline:none; transition:border-color .15s,box-shadow .15s; width:100%; }
    input:focus, select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.15); }
    .btn { display:inline-flex; align-items:center; gap:.35rem; padding:.52rem 1rem; border-radius:6px; font-size:.9rem; font-weight:600; border:none; cursor:pointer; transition:background .15s,opacity .15s; white-space:nowrap; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--primary-h); }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover:not(:disabled) { background:#b91c1c; }
    .btn-ghost { background:var(--surface2); color:var(--text-s); border:1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background:var(--border); }
    .btn-sm { padding:.32rem .6rem; font-size:.8rem; }
    #total-bar { background:linear-gradient(135deg,#1d4ed8,#2563eb); color:#fff; border-radius:var(--radius); padding:.85rem 1.1rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; font-weight:700; box-shadow:0 2px 8px rgba(37,99,235,.35); }
    #total-bar .label { font-size:.85rem; opacity:.9; }
    #total-bar .amount { font-size:1.5rem; }
    .category-group { margin-bottom:.85rem; }
    .category-header { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:8px 8px 0 0; padding:.45rem .75rem; gap:.5rem; }
    .category-title { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-s); }
    .cat-tienda-sel { font-size:.78rem; padding:.28rem .55rem; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); max-width:165px; cursor:pointer; }
    .cat-tienda-sel:focus { border-color:var(--primary); outline:none; }
    .item-row { display:flex; align-items:flex-start; gap:.5rem; padding:.65rem .65rem; border-left:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); transition:background .15s; }
    .item-row:last-child { border-radius:0 0 8px 8px; }
    .item-row.comprado { background:#f0fdf4; }
    .estado-btn { width:36px; height:36px; border-radius:50%; border:2px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:1.1rem; cursor:pointer; flex-shrink:0; margin-top:.1rem; transition:all .15s; user-select:none; }
    .estado-btn.comprado { border-color:var(--success); background:#dcfce7; }
    .item-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:.4rem; }
    .item-name { font-size:.92rem; font-weight:600; display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; }
    .item-qty-label { font-size:.75rem; color:var(--text-s); }
    .item-controls { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
    .inp-cant { width:68px; font-size:.85rem; padding:.3rem .45rem; text-align:center; }
    .inp-precio { width:100px; font-size:.88rem; padding:.3rem .45rem; text-align:right; font-weight:600; }
    .inp-marca { width:115px; font-size:.78rem; padding:.3rem .45rem; border:1px dashed var(--border); background:var(--surface2); border-radius:5px; }
    .inp-marca:focus { border-color:var(--primary); border-style:solid; outline:none; }
    .unidad-label { font-size:.78rem; color:var(--text-s); min-width:26px; }
    .oferta-btn { font-size:.72rem; font-weight:700; padding:.28rem .55rem; border-radius:12px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text-s); cursor:pointer; transition:all .15s; white-space:nowrap; user-select:none; }
    .oferta-btn.activo { background:#fef3c7; border-color:var(--warn); color:#92400e; }
    .formula-label { font-size:.75rem; color:var(--text-s); }
    .btn-remove { background:none; border:none; cursor:pointer; color:#b0bec5; font-size:1rem; padding:.25rem; border-radius:4px; flex-shrink:0; margin-top:.1rem; transition:color .15s; }
    .btn-remove:hover { color:var(--danger); }
    .tag { display:inline-block; padding:.18rem .5rem; border-radius:20px; font-size:.73rem; font-weight:700; background:#dbeafe; color:#1e40af; }
    .tag.gris { background:#e2e8f0; color:#334155; }
    .product-list-item { display:flex; align-items:center; justify-content:space-between; padding:.5rem .25rem; border-bottom:1px solid var(--border); gap:.5rem; }
    .product-list-item:last-child { border-bottom:none; }

    /* Stock badge en lista */
    .stock-badge { display:inline-flex; align-items:center; gap:.2rem; font-size:.72rem; font-weight:700; padding:.15rem .45rem; border-radius:20px; white-space:nowrap; }
    .stock-badge.verde  { background:#dcfce7; color:#15803d; }
    .stock-badge.naranja { background:#fef3c7; color:#92400e; }
    .stock-badge.rojo   { background:#fee2e2; color:#991b1b; }
    .stock-badge.sin    { background:#f1f5f9; color:#94a3b8; }

    /* Pestaña Stock */
    .stock-row { display:flex; align-items:center; gap:.5rem; padding:.6rem .25rem; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .stock-row:last-child { border-bottom:none; }
    .stock-prod-name { font-size:.9rem; font-weight:600; flex:1; min-width:120px; }
    .stock-prod-cat  { font-size:.72rem; color:var(--text-s); }
    .stock-inp { width:62px; font-size:.9rem; padding:.3rem .45rem; text-align:center; font-weight:700; }
    .stock-inp.verde  { border-color:var(--success); background:#f0fdf4; }
    .stock-inp.naranja{ border-color:var(--warn);    background:#fffbeb; }
    .stock-inp.rojo   { border-color:var(--danger);  background:#fef2f2; }
    .umbral-group { display:flex; align-items:center; gap:.3rem; }
    .umbral-lbl { font-size:.72rem; color:var(--text-s); white-space:nowrap; }
    .inp-umbral { width:52px; font-size:.82rem; padding:.28rem .4rem; text-align:center; }
    .stock-resumen { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .resumen-chip { display:flex; align-items:center; gap:.4rem; padding:.4rem .8rem; border-radius:20px; font-size:.82rem; font-weight:700; }
    .resumen-chip.verde  { background:#dcfce7; color:#15803d; }
    .resumen-chip.naranja { background:#fef3c7; color:#92400e; }
    .resumen-chip.rojo   { background:#fee2e2; color:#991b1b; }

    /* Historial */
    .hist-tienda-block { margin-bottom:1rem; }
    .hist-tienda-title { font-size:.95rem; font-weight:700; color:var(--primary); padding:.4rem .75rem; background:#e8edf5; border:1px solid #94a3b8; border-radius:8px 8px 0 0; border-bottom:2px solid var(--primary); }
    .hist-card { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; padding:.6rem .75rem; border-left:1px solid #94a3b8; border-right:1px solid #94a3b8; border-bottom:1px solid #94a3b8; background:var(--surface); }
    .hist-card:last-child { border-radius:0 0 8px 8px; }
    .hist-card-left { display:flex; flex-direction:column; gap:.18rem; flex:1; min-width:0; }
    .hist-card-name { font-size:.9rem; font-weight:700; color:var(--text); }
    .hist-card-meta { font-size:.75rem; color:var(--text-s); }
    .hist-card-marca { font-size:.75rem; color:#475569; font-style:italic; }
    .hist-card-right { display:flex; flex-direction:column; align-items:flex-end; gap:.18rem; flex-shrink:0; }
    .hist-price { font-size:1rem; font-weight:700; color:var(--success); }
    .hist-date { font-size:.72rem; color:var(--text-s); }
    .tienda-chip { display:inline-flex; align-items:center; gap:.35rem; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.3rem .75rem; font-size:.85rem; margin:.2rem; }
    .empty { text-align:center; padding:2rem 1rem; color:var(--text-s); font-size:.9rem; line-height:1.7; }
    #toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(100px); background:#1e293b; color:#fff; padding:.6rem 1.3rem; border-radius:20px; font-size:.875rem; z-index:999; transition:transform .3s; pointer-events:none; }
    #toast.show { transform:translateX(-50%) translateY(0); }
    .loading-screen { position:fixed; inset:0; background:var(--primary); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; gap:1rem; z-index:200; }
    .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #login-screen { position:fixed; inset:0; background:linear-gradient(135deg,#1e3a5f,#2563eb); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:300; }
    #login-screen h1 { color:#fff; font-size:1.8rem; font-weight:800; }
    #login-screen p { color:rgba(255,255,255,.75); font-size:.95rem; text-align:center; max-width:280px; line-height:1.6; }
    .btn-google { display:flex; align-items:center; gap:.75rem; background:#fff; color:#1e293b; font-size:1rem; font-weight:700; padding:.75rem 1.5rem; border-radius:8px; border:none; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.2); transition:box-shadow .15s; }
    .btn-google:hover { box-shadow:0 4px 16px rgba(0,0,0,.3); }
    .btn-google img { width:22px; height:22px; }
    .user-chip { display:flex; align-items:center; gap:.5rem; cursor:pointer; }
    .user-avatar { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,.5); }
    .user-name { font-size:.78rem; color:rgba(255,255,255,.9); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    @media (min-width:640px) { main { padding:1.5rem; } .form-row { flex-wrap:nowrap; } }

    /* Scanner modal */
    #scanner-modal { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:500; display:none; flex-direction:column; align-items:center; justify-content:flex-start; padding:1rem; overflow-y:auto; }
    #scanner-modal.open { display:flex; }
    #scanner-status { color:#fff; font-size:.9rem; margin:.75rem 0 .5rem; text-align:center; min-height:1.4em; }
    #scanner-result { background:var(--surface); border-radius:10px; width:100%; max-width:420px; padding:1rem; margin-top:.5rem; display:none; }
    #scanner-result.open { display:block; }
    #scanner-result h3 { font-size:.95rem; margin-bottom:.75rem; color:var(--primary); }
    .scan-btn-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.75rem; }
    #scanner-manual { background:var(--surface); border-radius:10px; width:100%; max-width:420px; padding:1rem; margin-top:.5rem; display:none; }
    #scanner-manual.open { display:block; }
    #scanner-manual h3 { font-size:.95rem; margin-bottom:.75rem; color:var(--text); }
    .btn-scan { background:#1e293b; color:#fff; border:1.5px solid #334155; border-radius:8px; padding:.42rem .8rem; font-size:.82rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; white-space:nowrap; }
    .btn-scan:hover { background:#334155; }
  </style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:3rem">🛒</div>
  <h1>Lista de Compras</h1>
  <p>Iniciá sesión para acceder a tu lista sincronizada en todos tus dispositivos.</p>
  <button class="btn-google" onclick="loginGoogle()">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13 17.7 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z'/%3E%3Cpath fill='%2334A853' d='M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z'/%3E%3Cpath fill='%23FBBC05' d='M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.3-7.7 2.3-6.3 0-11.6-4.2-13.5-9.9l-7.8 6C6.5 42.5 14.6 48 24 48z'/%3E%3C/svg%3E" alt="Google">
    Entrar con Google
  </button>
</div>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <span>Conectando con la nube…</span>
</div>

<div id="app" style="display:none">
  <header>
    <h1>🛒 Lista de Compras</h1>
    <div style="display:flex;align-items:center;gap:.6rem">
      <span id="sync-status" style="font-size:.75rem;background:rgba(255,255,255,.2);padding:.2rem .65rem;border-radius:12px">Conectando…</span>
      <div class="user-chip" onclick="cerrarSesion()" title="Cerrar sesión">
        <img id="user-avatar" class="user-avatar" src="" style="display:none">
        <span id="user-name" class="user-name"></span>
      </div>
    </div>
  </header>
  <nav>
    <button data-tab="lista"     class="active">🛒 Lista</button>
    <button data-tab="stock"             >📦 Stock</button>
    <button data-tab="catalogo"          >🗂 Catálogo</button>
    <button data-tab="tiendas"           >🏪 Tiendas</button>
    <button data-tab="historial"         >📊 Historial</button>
  </nav>
  <main>
    <div id="tab-lista"></div>
    <div id="tab-stock"     hidden></div>
    <div id="tab-catalogo"  hidden></div>
    <div id="tab-tiendas"   hidden></div>
    <div id="tab-historial" hidden></div>
  </main>
</div>
<div id="toast"></div>

<!-- Modal escáner -->
<div id="scanner-modal">
  <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;margin-bottom:.5rem">
    <span style="color:#fff;font-weight:700;font-size:1rem">📷 Escanear producto</span>
    <button onclick="cerrarScanner()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:.4rem .8rem;cursor:pointer;font-size:.85rem">✕ Cerrar</button>
  </div>
  <div id="scanner-status" style="margin:.5rem 0">Abriendo cámara…</div>
  <input type="file" id="scanner-file-input" accept="image/*" capture="environment" style="display:none">

  <!-- Panel: producto encontrado -->
  <div id="scanner-result">
    <h3 id="scanner-result-title">Producto encontrado</h3>
    <div id="scanner-result-body"></div>
    <div class="scan-btn-row" id="scanner-result-actions"></div>
  </div>

  <!-- Panel: carga manual -->
  <div id="scanner-manual">
    <h3 id="scanner-manual-title">Cargar producto manualmente</h3>
    <div class="form-row" style="flex-direction:column;gap:.6rem">
      <div class="form-group"><label>Nombre</label><input id="scan-inp-nombre" type="text" placeholder="Ej: Arroz largo fino"></div>
      <div class="form-group"><label>Marca</label><input id="scan-inp-marca" type="text" placeholder="Ej: Gallo"></div>
      <div class="form-group"><label>Categoría</label><select id="scan-sel-cat"><option value="">— Elegí —</option></select></div>
      <div class="form-group"><label>Unidad</label>
        <select id="scan-sel-unidad">
          <option value="unidad">unidad</option><option value="kg">kg</option><option value="g">g</option>
          <option value="litro">litro</option><option value="ml">ml</option>
          <option value="docena">docena</option><option value="paquete">paquete</option><option value="otro">otro</option>
        </select>
      </div>
      <input type="hidden" id="scan-barcode-val">
      <div class="scan-btn-row">
        <button class="btn btn-primary" onclick="guardarProductoEscaneado()">✓ Guardar producto</button>
        <button class="btn btn-ghost" onclick="cancelarManual()">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function sinMarca(cat) { const c=(cat||'').toLowerCase(); return c.includes('carnicer')||c.includes('verduler')||c.includes('pescader'); }
function calcTotal(it) { if(!it.precio||it.estado!=='comprado') return 0; return it.esOferta?parseFloat(it.precio):parseFloat(it.precio)*(parseFloat(it.cantidad)||1); }
function fmt(n) { return parseFloat(n||0).toLocaleString('es-AR'); }
function syncStatus(txt,err) { const el=document.getElementById('sync-status'); if(!el) return; el.textContent=txt; el.style.background=err?'rgba(220,38,38,.4)':'rgba(255,255,255,.2)'; }

// ── Estado ────────────────────────────────────────────────────
let categorias=[], productos=[], tiendas=[], lista=[], historial=[], stock=[];
let listenersOk=0;
let filtroCatLista='';
let filtroCatStock='';
let currentUser=null;
let unsubscribers=[];

// ── Firebase ──────────────────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.firestore();
const auth=firebase.auth();
const googleProvider=new firebase.auth.GoogleAuthProvider();

// ── Auth ──────────────────────────────────────────────────────
window.loginGoogle=()=>auth.signInWithPopup(googleProvider).catch(e=>toast('Error al iniciar sesión'));
window.cerrarSesion=async()=>{
  if(!confirm('¿Cerrar sesión?')) return;
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  await auth.signOut();
};

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('loading').style.display='flex';
    // Mostrar avatar
    const av=document.getElementById('user-avatar');
    const nm=document.getElementById('user-name');
    if(av&&user.photoURL){av.src=user.photoURL;av.style.display='';}
    if(nm) nm.textContent=user.displayName?.split(' ')[0]||'';
    // Migrar datos sin userId
    await migrarDatos(user.uid);
    // Iniciar listeners
    iniciarListeners(user.uid);
  } else {
    currentUser=null;
    unsubscribers.forEach(u=>u()); unsubscribers=[];
    listenersOk=0;
    categorias=[]; productos=[]; tiendas=[]; lista=[]; historial=[]; stock=[];
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

async function migrarDatos(uid) {
  const cols=['categorias','productos','tiendas','lista','historial','stock'];
  for(const col of cols){
    const snap=await db.collection(col).where('userId','==',null).get().catch(()=>({docs:[]}));
    // Firestore no permite where null, buscamos docs sin campo userId
    const snap2=await db.collection(col).get();
    const sinUsuario=snap2.docs.filter(d=>!d.data().userId);
    if(sinUsuario.length){
      const batch=db.batch();
      sinUsuario.forEach(d=>batch.update(d.ref,{userId:uid}));
      await batch.commit();
    }
  }
}

function onListenerReady() {
  listenersOk++;
  if(listenersOk===6){ document.getElementById('loading').style.display='none'; document.getElementById('app').style.display=''; render(); }
}

function iniciarListeners(uid){
  listenersOk=0;
  const q=col=>db.collection(col).where('userId','==',uid);
  unsubscribers.push(
    q('categorias').onSnapshot(s=>{categorias=s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();syncStatus('✓ Sincronizado');},()=>syncStatus('⚠ Sin conexión',true)),
    q('productos') .onSnapshot(s=>{productos =s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();},()=>{}),
    q('tiendas')   .onSnapshot(s=>{tiendas   =s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();},()=>{}),
    q('lista')     .onSnapshot(s=>{lista     =s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();},()=>{}),
    q('historial') .onSnapshot(s=>{historial =s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();},()=>{}),
    q('stock')     .onSnapshot(s=>{stock     =s.docs.map(d=>({...d.data(),_id:d.id}));onListenerReady();render();},()=>{})
  );
}

async function fsSet(col,id,data){
  await db.collection(col).doc(id).set({...data, userId:currentUser.uid});
}
async function fsDel(col,id){await db.collection(col).doc(id).delete();}

function getStock(productoId) { return stock.find(s=>s.productoId===productoId); }

function stockClase(s) {
  if(!s||s.cantidad===undefined||s.cantidad===null||s.cantidad==='') return 'sin';
  const cant = parseFloat(s.cantidad)||0;
  const umbRojo   = parseFloat(s.umbralRojo??0);
  const umbNaranja= parseFloat(s.umbralNaranja??1);
  if(cant<=umbRojo)    return 'rojo';
  if(cant<=umbNaranja) return 'naranja';
  return 'verde';
}

function stockBadge(productoId) {
  const s = getStock(productoId);
  if(!s||s.cantidad===undefined) return '';
  const clase = stockClase(s);
  const iconos = {verde:'🟢', naranja:'🟡', rojo:'🔴', sin:''};
  return `<span class="stock-badge ${clase}">${iconos[clase]} ${s.cantidad} ${s.unidad||''}</span>`;
}

async function sumarStock(productoId, cantidad, unidad) {
  const s = getStock(productoId);
  const id = s ? s._id : uid();
  const base = s || {productoId, unidad: unidad||'u', umbralNaranja:1, umbralRojo:0};
  const nueva = (parseFloat(base.cantidad)||0) + (parseFloat(cantidad)||0);
  await fsSet('stock', id, {...base, cantidad: nueva});
}

window.agregarALista=async()=>{
  const prodId=document.getElementById('sel-prod').value;

window.setPrecio=async(id,v)=>{const it=lista.find(i=>i._id===id);if(!it)return;const n={...it,precio:parseFloat(v)||0};await fsSet('lista',id,n);await guardarHistorial(id,n);};

async function guardarHistorial(id,it){
  if(!it||it.estado!=='comprado'||!it.precio) return;
  const h=historial.find(x=>x.sesionId===id);
  const esNuevo=!h;
  await fsSet('historial',h?h._id:uid(),{sesionId:id,productoId:it.productoId,nombre:it.nombre,categoria:it.categoria,precio:it.precio,total:calcTotal(it),cantidad:it.cantidad,unidad:it.unidad||'u',esOferta:it.esOferta||false,marca:it.marca||'',tiendaId:it.tiendaId||'',fecha:new Date().toISOString()});
  // Suma al stock solo la primera vez que se carga el precio
  if(esNuevo) await sumarStock(it.productoId, it.cantidad, it.unidad);
}

window.filtrarStockCat=(cat)=>{ filtroCatStock=cat; renderStock(); };

window.setStockCantidad=async(productoId, unidad, valor)=>{
  const s=getStock(productoId);
  const id=s?s._id:uid();
  const base=s||{productoId, unidad, umbralNaranja:1, umbralRojo:0};
  const cantidad=parseFloat(valor)||0;
  const umbRojo=parseFloat(base.umbralRojo??0);
  await fsSet('stock',id,{...base,cantidad});

  if(cantidad<=umbRojo){
    // Stock en rojo (≤ umbralRojo) → agregar a la lista si no está
    const yaEnLista=lista.some(i=>i.productoId===productoId);
    if(!yaEnLista){
      const prod=productos.find(p=>p._id===productoId);
      if(prod){
        await fsSet('lista',uid(),{
          productoId:prod._id, nombre:prod.nombre, categoria:prod.categoria,
          unidad:prod.unidad, cantidad:1, estado:'falta',
          precio:'', marca:'', esOferta:false, tiendaId:''
        });
        toast(`${prod.nombre} agregado a la lista (stock bajo)`);
      }
    }
  } else {
    // Stock suficiente → sacar de la lista si todavía está en "falta"
    const enLista=lista.find(i=>i.productoId===productoId && i.estado==='falta');
    if(enLista){
      await fsDel('lista', enLista._id);
      toast(`${enLista.nombre} quitado de la lista (stock actualizado)`);
    }
  }
};

window.resetearCategoria=async(catSlug)=>{
  const cat=decodeURIComponent(catSlug);
  if(!confirm(`¿Borrar valores de stock de "${cat}"?`)) return;
  const prods=productos.filter(p=>p.categoria===cat);
  await Promise.all(prods.map(async p=>{
    const s=getStock(p._id);
    if(s) await fsSet('stock',s._id,{...s,cantidad:null});
  }));
  toast(`Valores de ${cat} borrados`);
};

window.nuevoInventario=async()=>{
  if(!confirm('¿Borrar todos los valores de stock para empezar un inventario nuevo?')) return;
  await Promise.all(stock.map(s=>fsSet('stock',s._id,{...s,cantidad:null})));
  toast('Inventario reseteado — cargá los valores nuevos');
};

window.setUmbral=async(productoId, tipo, valor)=>{
  const s=getStock(productoId);
  if(!s) return;
  const key=tipo==='naranja'?'umbralNaranja':'umbralRojo';
  await fsSet('stock',s._id,{...s,[key]:parseFloat(valor)||0});
};

          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="tag">${p.unidad}</span>
            <button class="btn btn-ghost btn-sm" onclick="toggleEditProd('${p._id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="eliminarProducto('${p._id}')">✕</button>
          </div>
        </div>
        <div id="edit-${p._id}" style="display:none;padding:.5rem .25rem .75rem;border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 0 6px 6px;background:var(--surface2)">
          <div class="form-row" style="padding:0 .5rem">
            <div class="form-group"><label>Nombre</label><input type="text" value="${p.nombre}" id="enombre-${p._id}"></div>
            ${!sinMarca(p.categoria)?`<div class="form-group"><label>Marca</label><input type="text" value="${p.marcaDefault||''}" id="emarca-${p._id}"></div>`:''}
            <div class="form-group"><label>Categoría</label><select id="ecat-${p._id}"><option value="">— Elegí —</option>${catOpts2(p.categoria)}</select></div>
            <div class="form-group" style="max-width:115px"><label>Unidad</label><select id="eunidad-${p._id}">${unOpts2(p.unidad)}</select></div>
            <div class="form-group" style="flex:0"><label>&nbsp;</label>
              <button class="btn btn-primary btn-sm" onclick="guardarEditProd('${p._id}')">✓ Guardar</button>
            </div>
          </div>
        </div>`).join('')}</div>`).join('');
  wrap.innerHTML=`
    <div class="card"><h2>Nueva categoría</h2>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input id="inp-cat" type="text" placeholder="Ej: Almacén, Limpieza…"></div>
        <div class="form-group" style="flex:0"><label>&nbsp;</label><button class="btn btn-primary" onclick="agregarCategoria()">+ Crear</button></div>
      </div>
      ${categorias.length>0?`<div style="margin-top:.75rem">${categorias.map(c=>`<span class="tienda-chip">${c.nombre}<button style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:.8rem" onclick="eliminarCategoria('${c._id}')">✕</button></span>`).join('')}</div>`:'<p style="margin-top:.5rem;font-size:.8rem;color:var(--text-s)">Creá una categoría primero.</p>'}
    </div>
    <div class="card"><h2>Nuevo producto</h2>
      <div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">
        <button class="btn-scan" onclick="abrirScanner('catalogo')">📷 Escanear y agregar</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input id="inp-prod" type="text" placeholder="Ej: Azúcar…"></div>
        <div class="form-group" id="grp-marca-prod"><label>Marca (opcional)</label><input id="inp-marca-prod" type="text" placeholder="Ej: Ledesma"></div>
        <div class="form-group"><label>Categoría</label><select id="sel-cat-prod" onchange="actualizarMarcaProd()"><option value="">— Elegí —</option>${catOpts}</select></div>
        <div class="form-group" style="max-width:115px"><label>Unidad</label><select id="sel-unidad">${unOpts}</select></div>
        <div class="form-group" style="flex:0"><label>&nbsp;</label><button class="btn btn-primary" onclick="agregarProducto()">+ Agregar</button></div>
      </div>
    </div>
    ${productos.length===0?'<div class="empty">No hay productos todavía.</div>':prodHTML}`;
}
window.actualizarMarcaProd=()=>{const g=document.getElementById('grp-marca-prod');if(g)g.style.display=sinMarca(document.getElementById('sel-cat-prod')?.value||'')?'none':'';};
window.agregarCategoria=async()=>{const inp=document.getElementById('inp-cat');const n=inp.value.trim();if(!n)return toast('Escribí el nombre');if(categorias.find(c=>c.nombre.toLowerCase()===n.toLowerCase()))return toast('Ya existe');await fsSet('categorias',uid(),{nombre:n});inp.value='';toast('Categoría creada');};
window.eliminarCategoria=async id=>{if(!confirm('¿Eliminar?'))return;await fsDel('categorias',id);};
window.agregarProducto=async()=>{const n=document.getElementById('inp-prod').value.trim();const cat=document.getElementById('sel-cat-prod').value;const u=document.getElementById('sel-unidad').value;const m=sinMarca(cat)?'':(document.getElementById('inp-marca-prod')?.value.trim()||'');if(!n)return toast('Escribí el nombre');if(!cat)return toast('Seleccioná categoría');await fsSet('productos',uid(),{nombre:n,marcaDefault:m,categoria:cat,unidad:u});document.getElementById('inp-prod').value='';if(document.getElementById('inp-marca-prod'))document.getElementById('inp-marca-prod').value='';toast('Producto agregado');};
window.eliminarProducto=async id=>{if(!confirm('¿Eliminar?'))return;await fsDel('productos',id);};
window.toggleEditProd=(id)=>{const el=document.getElementById('edit-'+id);if(el)el.style.display=el.style.display==='none'?'block':'none';};
window.guardarEditProd=async(id)=>{
  const nombre=(document.getElementById('enombre-'+id)?.value||'').trim();
  const cat=(document.getElementById('ecat-'+id)?.value||'').trim();
  const unidad=(document.getElementById('eunidad-'+id)?.value||'').trim();
  const marca=(document.getElementById('emarca-'+id)?.value||'').trim();
  if(!nombre)return toast('El nombre no puede estar vacío');
  if(!cat)return toast('Seleccioná una categoría');
  const prod=productos.find(p=>p._id===id);
  if(!prod)return;
  await fsSet('productos',id,{...prod,nombre,categoria:cat,unidad,marcaDefault:marca});
  toast('Producto actualizado');
};

function renderTiendas() {
  document.getElementById('tab-tiendas').innerHTML=`
    <div class="card"><h2>Nueva tienda / mercado</h2>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input id="inp-tienda" type="text" placeholder="Ej: Carrefour…"></div>
        <div class="form-group" style="flex:0"><label>&nbsp;</label><button class="btn btn-primary" onclick="agregarTienda()">+ Agregar</button></div>

      ${tiendas.length===0?'<div class="empty">No hay tiendas todavía.</div>':tiendas.sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(t=>`<div class="product-list-item"><span>🏪 ${t.nombre}</span><button class="btn btn-danger btn-sm" onclick="eliminarTienda('${t._id}')">✕</button></div>`).join('')}

window.agregarTienda=async()=>{const inp=document.getElementById('inp-tienda');const n=inp.value.trim();if(!n)return toast('Escribí el nombre');await fsSet('tiendas',uid(),{nombre:n});inp.value='';toast('Tienda agregada');};
window.eliminarTienda=async id=>{if(!confirm('¿Eliminar?'))return;await fsDel('tiendas',id);};

//  HISTORIAL
// ══════════════════════════════════════════════════════════════
function renderHistorial() {
  const wrap=document.getElementById('tab-historial');
  if(!historial.length){wrap.innerHTML='<div class="empty">Acá vas a ver el historial agrupado por tienda.<br>Completá una compra para empezar.</div>';return;}
  const pt={};
  historial.forEach(h=>{const t=tiendas.find(x=>x._id===h.tiendaId);const k=t?t._id:'__sin__';const n=t?t.nombre:'Sin tienda';if(!pt[k])pt[k]={nombre:n,items:[]};pt[k].items.push(h);});
  wrap.innerHTML=Object.entries(pt).sort(([,a],[,b])=>a.nombre.localeCompare(b.nombre)).map(([,g])=>{
    const sorted=g.items.sort((a,b)=>b.fecha.localeCompare(a.fecha));
    return `<div class="hist-tienda-block"><div class="hist-tienda-title">🏪 ${g.nombre}</div>
      ${sorted.map(r=>{
        const marca=sinMarca(r.categoria)?'':(r.marca||'');
        const totalStr=r.esOferta?`$ ${fmt(r.precio)} <small>(oferta)</small>`:`$ ${fmt(r.precio)} <small>c/u · total $ ${fmt(r.total||r.precio)}</small>`;
        return `<div class="hist-card">
          <div class="hist-card-left">
            <div class="hist-card-name">${r.nombre} <span class="tag gris" style="font-size:.7rem">${r.categoria}</span></div>
            <div class="hist-card-meta">${r.cantidad} ${r.unidad}${marca?' · ':''}<span class="hist-card-marca">${marca}</span></div>
          </div>
          <div class="hist-card-right">
            <div class="hist-price">${totalStr}</div>
            <div class="hist-date">${new Date(r.fecha).toLocaleDateString('es-AR')}</div>
          </div>
        </div>`;
      }).join('')}</div>`;
  }).join('');
}

//  SCANNER
// ══════════════════════════════════════════════════════════════
let scannerCtx = null; // 'stock' | 'lista' | 'catalogo'
let scannerReader = null;
let scannerStream = null;
let scannerActivo = false;

window.abrirScanner = (ctx) => {
  scannerCtx = ctx;
  scannerActivo = true;
  document.getElementById('scanner-modal').classList.add('open');
  document.getElementById('scanner-result').classList.remove('open');
  document.getElementById('scanner-manual').classList.remove('open');
  document.getElementById('scanner-status').textContent = 'Apuntá la cámara al código de barras…';
  // Poblar select de categorías
  const sel = document.getElementById('scan-sel-cat');
  sel.innerHTML = '<option value="">— Elegí —</option>' +
    categorias.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre))
      .map(c=>`<option value="${c.nombre}">${c.nombre}</option>`).join('');
  iniciarCamara();
};

window.cerrarScanner = () => {
  scannerActivo = false;
  detenerCamara();
  document.getElementById('scanner-modal').classList.remove('open');
};

function iniciarCamara() {
  const input = document.getElementById('scanner-file-input');
  input.value = '';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) { document.getElementById('scanner-status').textContent = 'Cancelado.'; return; }
    document.getElementById('scanner-status').textContent = 'Procesando imagen…';
    const url = URL.createObjectURL(file);
    try {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.ITF, ZXing.BarcodeFormat.QR_CODE
      ]);
      const reader = new ZXing.BrowserMultiFormatReader(hints);
      const result = await reader.decodeFromImageUrl(url);
      URL.revokeObjectURL(url);
      procesarCodigo(result.getText());
    } catch(e) {
      URL.revokeObjectURL(url);
      const el = document.getElementById('scanner-result');
      el.classList.add('open');
      document.getElementById('scanner-result-title').textContent = '⚠ No se pudo leer el código';
      document.getElementById('scanner-result-body').innerHTML = '<div style="font-size:.85rem;color:var(--text-s)">Intentá con mejor iluminación, más cerca, o que el código ocupe bien el encuadre.</div>';
      document.getElementById('scanner-result-actions').innerHTML =
        `<button class="btn btn-primary btn-sm" onclick="rescanear()">📷 Intentar de nuevo</button>
         <button class="btn btn-ghost btn-sm" onclick="cerrarScanner()">✕ Cerrar</button>`;
      document.getElementById('scanner-status').textContent = '';
    }
  };
  input.click();
}

function detenerCamara() { /* nativo — nada que detener */ }

async function procesarCodigo(barcode) {
  detenerCamara();
  document.getElementById('scanner-status').textContent = `Código: ${barcode} — buscando…`;

  // 1. Buscar en catálogo propio
  const prodLocal = productos.find(p => p.barcode === barcode);
  if (prodLocal) {
    mostrarResultadoLocal(prodLocal);
    return;
  }

  // 2. Buscar en Open Food Facts
  document.getElementById('scanner-status').textContent = 'No está en tu catálogo. Consultando base global…';
  try {
    const resp = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await resp.json();
    if (data.status === 1 && data.product) {
      const p = data.product;
      const nombre = p.product_name_es || p.product_name || '';
      const marca  = p.brands ? p.brands.split(',')[0].trim() : '';
      mostrarResultadoOFF({ barcode, nombre, marca });
      return;
    }
  } catch(e) {}

  // 3. No encontrado en ningún lado → carga manual
  mostrarManual(barcode, '', '');
}

function mostrarResultadoLocal(prod) {
  const el = document.getElementById('scanner-result');
  el.classList.add('open');
  document.getElementById('scanner-result-title').textContent = '✅ Producto encontrado en tu catálogo';
  document.getElementById('scanner-result-body').innerHTML = `
    <div style="font-weight:700;font-size:1rem">${prod.nombre}</div>
    <div style="font-size:.8rem;color:var(--text-s);margin-top:.2rem">${prod.categoria} · ${prod.unidad}${prod.marcaDefault?' · '+prod.marcaDefault:''}</div>`;

  let actions = '';
  if (scannerCtx === 'stock') {
    actions = `<div style="display:flex;align-items:center;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
      <label style="font-size:.85rem;font-weight:600">Cantidad en stock:</label>
      <input type="number" id="scan-stock-qty" value="1" min="0" step="1" style="width:70px;padding:.3rem .45rem;text-align:center;border:1px solid var(--border);border-radius:6px">
      <span style="font-size:.85rem">${prod.unidad}</span>
      <button class="btn btn-primary btn-sm" onclick="confirmarStockEscaneado('${prod._id}','${prod.unidad}')">✓ Guardar stock</button>
    </div>`;
  } else if (scannerCtx === 'lista') {
    actions = `<button class="btn btn-primary btn-sm" onclick="agregarEscaneadoALista('${prod._id}')">+ Agregar a la lista</button>`;
  } else {
    actions = `<div style="font-size:.82rem;color:var(--text-s);margin-top:.4rem">Producto ya está en tu catálogo.</div>`;
  }
  actions += `<button class="btn btn-ghost btn-sm" onclick="rescanear()">🔄 Escanear otro</button>
              <button class="btn btn-ghost btn-sm" onclick="cerrarScanner()">✕ Cerrar</button>`;
  document.getElementById('scanner-result-actions').innerHTML = actions;
}

function mostrarResultadoOFF({ barcode, nombre, marca }) {
  const el = document.getElementById('scanner-result');
  el.classList.add('open');
  document.getElementById('scanner-result-title').textContent = '🌐 Encontrado en base global';
  document.getElementById('scanner-result-body').innerHTML = `
    <div style="font-weight:700;font-size:1rem">${nombre||'(sin nombre)'}</div>
    ${marca?`<div style="font-size:.8rem;color:var(--text-s);margin-top:.2rem">${marca}</div>`:''}
    <div style="font-size:.75rem;color:var(--text-s);margin-top:.3rem">Completá la categoría y unidad para guardarlo en tu catálogo.</div>`;
  document.getElementById('scanner-result-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="mostrarManual('${barcode}','${nombre.replace(/'/g,"\\'")}','${marca.replace(/'/g,"\\'")}')">+ Guardar en mi catálogo</button>
     <button class="btn btn-ghost btn-sm" onclick="rescanear()">🔄 Escanear otro</button>
     <button class="btn btn-ghost btn-sm" onclick="cerrarScanner()">✕ Cerrar</button>`;
}

window.mostrarManual = (barcode, nombre, marca) => {
  document.getElementById('scanner-result').classList.remove('open');
  const m = document.getElementById('scanner-manual');
  m.classList.add('open');
  document.getElementById('scanner-manual-title').textContent =
    barcode ? `Cargar producto (cód: ${barcode})` : 'Cargar producto manualmente';
  document.getElementById('scan-inp-nombre').value = nombre || '';
  document.getElementById('scan-inp-marca').value  = marca  || '';
  document.getElementById('scan-barcode-val').value = barcode || '';
};

window.cancelarManual = () => {
  document.getElementById('scanner-manual').classList.remove('open');
  rescanear();
};

window.guardarProductoEscaneado = async () => {
  const nombre  = document.getElementById('scan-inp-nombre').value.trim();
  const marca   = document.getElementById('scan-inp-marca').value.trim();
  const cat     = document.getElementById('scan-sel-cat').value;
  const unidad  = document.getElementById('scan-sel-unidad').value;
  const barcode = document.getElementById('scan-barcode-val').value.trim();
  if (!nombre) return toast('Escribí el nombre del producto');
  if (!cat)    return toast('Seleccioná una categoría');
  const id = uid();
  await fsSet('productos', id, { nombre, marcaDefault: marca, categoria: cat, unidad, barcode });
  toast('Producto guardado en tu catálogo');
  document.getElementById('scanner-manual').classList.remove('open');
  // Ejecutar acción según contexto
  const prod = { _id: id, nombre, marcaDefault: marca, categoria: cat, unidad, barcode };
  if (scannerCtx === 'stock') {
    mostrarResultadoLocal(prod);
  } else if (scannerCtx === 'lista') {
    await fsSet('lista', uid(), { productoId: id, nombre, categoria: cat, unidad, cantidad: 1, estado: 'falta', precio: '', marca: '', esOferta: false, tiendaId: '' });
    toast(`${nombre} agregado a la lista`);
    cerrarScanner();
  } else {
    toast('Producto guardado');
    cerrarScanner();
  }
};

window.confirmarStockEscaneado = async (prodId, unidad) => {
  const qty = parseFloat(document.getElementById('scan-stock-qty').value) || 0;
  await setStockCantidad(prodId, unidad, qty);
  toast('Stock actualizado');
  cerrarScanner();
};

window.agregarEscaneadoALista = async (prodId) => {
  const prod = productos.find(p => p._id === prodId);
  if (!prod) return;
  const yaEnLista = lista.some(i => i.productoId === prodId);
  if (yaEnLista) { toast('Ya está en la lista'); cerrarScanner(); return; }
  await fsSet('lista', uid(), { productoId: prod._id, nombre: prod.nombre, categoria: prod.categoria, unidad: prod.unidad, cantidad: 1, estado: 'falta', precio: '', marca: '', esOferta: false, tiendaId: '' });
  toast(`${prod.nombre} agregado a la lista`);
  cerrarScanner();
};

function rescanear() {
  document.getElementById('scanner-result').classList.remove('open');
  document.getElementById('scanner-manual').classList.remove('open');
  document.getElementById('scanner-status').textContent = 'Apuntá la cámara al código de barras…';
  scannerActivo = true;
  iniciarCamara();
}

// ── Render global ─────────────────────────────────────────────
function render() {
  if(tabActual==='lista')     renderLista();
  if(tabActual==='stock')     renderStock();
  if(tabActual==='catalogo')  renderCatalogo();
  if(tabActual==='tiendas')   renderTiendas();
  if(tabActual==='historial') renderHistorial();
}
</script>
